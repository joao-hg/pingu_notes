name: pingu_notes
description: "Pingu Notes — offline-first knowledge management app built with Flutter, Clean Architecture, SQLite and spaced repetition."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.1
  intl: ^0.20.2
  provider: ^6.1.2
  get_it: ^8.0.3
  equatable: ^2.0.7
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0
  flutter_colorpicker: ^1.1.0
  google_fonts: ^6.3.0
  sqflite_common_ffi: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.15.0
  mockito: ^5.7.0
flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D3B66"
  adaptive_icon_foreground: "assets/icon/icon.png"